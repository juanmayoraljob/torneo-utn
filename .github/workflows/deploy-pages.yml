name: Deploy to GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_RESULTS_EXCEL_URL: ${{ vars.VITE_RESULTS_EXCEL_URL }}
          VITE_FIXTURE_EXCEL_URL: ${{ vars.VITE_FIXTURE_EXCEL_URL }}
          VITE_AUTO_REFRESH_MS: ${{ vars.VITE_AUTO_REFRESH_MS || '120000' }}
          VITE_ENABLE_MANUAL_UPLOAD: ${{ vars.VITE_ENABLE_MANUAL_UPLOAD || 'false' }}
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            export VITE_BASE_PATH="/"
          else
            export VITE_BASE_PATH="/${{ github.event.repository.name }}/"
          fi
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
